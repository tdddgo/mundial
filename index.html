<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#E11D48">
  <meta name="description" content="Dashboard del Mundial 2026 — partidos por grupos, favoritos y exportación a calendario (.ics).">
  <title>Mundial 2026 · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --bg-elev: #f5f5f4;
      --card-bg: #ffffff;
      --card-starred: #fff8f0;
      --border: #e7e5e4;
      --border-strong: #1c1917;
      --text-primary: #0c0a09;
      --text-secondary: #44403c;
      --text-muted: #78716c;
      --accent: #E11D48;
      --accent-soft: #fef2f4;
      --gold: #FACC15;
      --display: 'Bebas Neue', 'Oswald', 'Arial Narrow', system-ui, sans-serif;
      --display-condensed: 'Oswald', 'Bebas Neue', system-ui, sans-serif;
      --g-A: #E11D48; --g-B: #7C3AED; --g-C: #2563EB; --g-D: #0D9488;
      --g-E: #65A30D; --g-F: #F59E0B; --g-G: #EA580C; --g-H: #DB2777;
      --g-I: #FB7185; --g-J: #06B6D4; --g-K: #4F46E5; --g-L: #059669;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --bg-elev: #171717;
        --card-bg: #141414;
        --card-starred: #1a0d10;
        --border: #262626;
        --border-strong: #fafafa;
        --text-primary: #fafafa;
        --text-secondary: #d4d4d4;
        --text-muted: #737373;
        --accent: #FB7185;
        --accent-soft: #1f0a10;
        --gold: #FDE047;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text-primary); font-family: 'DM Sans', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
    .display { font-family: var(--display); font-weight: 400; letter-spacing: 0.005em; }
    .display-cond { font-family: var(--display-condensed); font-weight: 700; letter-spacing: 0.01em; }
    .upper { text-transform: uppercase; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    input::placeholder { color: var(--text-muted); }
    button { font-family: inherit; }
    button:active { transform: scale(0.97); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .match-enter { animation: fadeIn 0.25s ease both; }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    /* Splash while Babel loads */
    #splash {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--accent); z-index: 999;
      font-family: var(--display); font-size: 56px; letter-spacing: 0.02em; text-transform: uppercase;
    }
    #splash::after { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-left: 10px; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#0a0a0a">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0a0a0a"/>
      <g transform="translate(160 220)">
        <rect x="0" y="0" width="260" height="260" fill="#E11D48"/>
        <rect x="260" y="0" width="260" height="260" fill="#7C3AED"/>
        <rect x="520" y="0" width="260" height="260" fill="#06B6D4"/>
        <rect x="0" y="260" width="260" height="260" fill="#65A30D"/>
        <rect x="260" y="260" width="260" height="260" fill="#FACC15"/>
        <rect x="520" y="260" width="260" height="260" fill="#EA580C"/>
      </g>
      <text x="600" y="720" text-anchor="middle" font-family="Bebas Neue, Impact, sans-serif" font-size="96" fill="#fafafa" letter-spacing="4">MUNDIAL 26</text>
    </svg>
  </template>
  <div id="splash">MUNDIAL 26</div>
  <div id="root"></div>

  <!-- React 18 (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data + App -->
  <script src="src/data.js"></script>
  <script src="src/slugs.js"></script>
  <script type="text/babel" src="src/app.jsx"></script>
  <script>
    // Hide splash once React mounts something
    const obs = new MutationObserver(() => {
      const root = document.getElementById("root");
      if (root && root.children.length > 0) {
        const s = document.getElementById("splash");
        if (s) { s.style.transition = "opacity 0.25s ease"; s.style.opacity = "0"; setTimeout(() => s.remove(), 250); }
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById("root"), { childList: true });
  </script>
</body>
</html>

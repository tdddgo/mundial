  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1ec;
      --bg-elev: #ffffff;
      --card-bg: #ffffff;
      --card-starred: #fffaf2;
      --border: #e0dcd2;
      --border-strong: #1c1917;
      --text-primary: #14110f;
      --text-secondary: #4a4540;
      --text-muted: #8a847c;
      --accent: #C8102E;
      --accent-soft: #fbe9ec;
      --gold: #C7A35A;
      --display: 'Bebas Neue', 'Arial Narrow', system-ui, sans-serif;
      --display-condensed: 'Bebas Neue', 'Arial Narrow', system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --g-A: #C8102E; --g-B: #6D28D9; --g-C: #1D4ED8; --g-D: #0F766E;
      --g-E: #4D7C0F; --g-F: #B45309; --g-G: #C2410C; --g-H: #BE185D;
      --g-I: #E11D48; --g-J: #0E7490; --g-K: #4338CA; --g-L: #047857;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #100e0c;
        --bg-elev: #1a1614;
        --card-bg: #1a1614;
        --card-starred: #211a14;
        --border: #2d2620;
        --border-strong: #f5f1e8;
        --text-primary: #f5f1e8;
        --text-secondary: #c4bcae;
        --text-muted: #7a736a;
        --accent: #F87171;
        --accent-soft: #2a1416;
        --gold: #E0C284;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text-primary); font-family: 'DM Sans', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
    body {
      background-image:
        radial-gradient(circle at 1px 1px, rgba(20,17,15,0.04) 1px, transparent 0);
      background-size: 24px 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background-image: radial-gradient(circle at 1px 1px, rgba(245,241,232,0.025) 1px, transparent 0); }
    }
    .display { font-family: var(--display); font-weight: 400; letter-spacing: 0.005em; }
    .display-cond { font-family: var(--display-condensed); font-weight: 400; letter-spacing: 0.005em; }
    .mono { font-family: var(--mono); font-feature-settings: "tnum" 1; }
    .upper { text-transform: uppercase; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    input::placeholder { color: var(--text-muted); }
    button { font-family: inherit; }
    button:active { transform: scale(0.97); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .match-enter { animation: fadeIn 0.25s ease both; }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes livePulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.6; }
    }
    /* Splash while Babel loads */
    #splash {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--accent); z-index: 999;
      font-family: var(--display); font-size: 56px; letter-spacing: 0.02em; text-transform: uppercase;
    }
    #splash::after { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-left: 10px; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#0a0a0a">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0a0a0a"/>
      <g transform="translate(160 220)">
        <rect x="0" y="0" width="260" height="260" fill="#E11D48"/>
        <rect x="260" y="0" width="260" height="260" fill="#7C3AED"/>
        <rect x="520" y="0" width="260" height="260" fill="#06B6D4"/>
        <rect x="0" y="260" width="260" height="260" fill="#65A30D"/>
        <rect x="260" y="260" width="260" height="260" fill="#FACC15"/>
        <rect x="520" y="260" width="260" height="260" fill="#EA580C"/>
      </g>
      <text x="600" y="720" text-anchor="middle" font-family="Bebas Neue, Impact, sans-serif" font-size="96" fill="#fafafa" letter-spacing="4">MUNDIAL 26</text>
    </svg>
  </template>
  <div id="splash">MUNDIAL 26</div>
  <div id="root"></div>

  <!-- React 18 (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data + App -->
  <script src="src/data.js"></script>
  <script src="src/slugs.js"></script>
  <script type="text/babel" src="src/app.jsx"></script>
  <script>
    // Hide splash once React mounts something
    const obs = new MutationObserver(() => {
      const root = document.getElementById("root");
      if (root && root.children.length > 0) {
        const s = document.getElementById("splash");
        if (s) { s.style.transition = "opacity 0.25s ease"; s.style.opacity = "0"; setTimeout(() => s.remove(), 250); }
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById("root"), { childList: true });

    // PWA — register service worker (skip on file:// and on the bundled standalone)
    if ("serviceWorker" in navigator && location.protocol !== "file:" && !document.documentElement.hasAttribute("data-bundled")) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
